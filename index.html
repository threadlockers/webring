<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        var saved;
        try { saved = localStorage.getItem("theme"); } catch (e) {}
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
      })();
    </script>
    <title>threadlocked · webring</title>
    <style>
      :root {
        /* rosé pine dawn (light) */
        --base: #faf4ed;
        --surface: #fffaf3;
        --overlay: #f2e9e1;
        --muted: #9893a5;
        --subtle: #797593;
        --text: #575279;
        --love: #b4637a;
        --gold: #ea9d34;
        --rose: #d7827e;
        --pine: #286983;
        --foam: #56949f;
        --iris: #907aa9;
        --highlight: #f4ede8;
        --radius: 0;
        --theme: var(--base);
        --tertiary: var(--muted);
        --secondary: var(--subtle);
      }
      :root[data-theme="dark"] {
        /* rosé pine (dark) */
        --base: #191724;
        --surface: #1f1d2e;
        --overlay: #26233a;
        --muted: #6e6a86;
        --subtle: #908caa;
        --text: #e0def4;
        --love: #eb6f92;
        --gold: #f6c177;
        --rose: #ebbcba;
        --pine: #31748f;
        --foam: #9ccfd8;
        --iris: #c4a7e7;
        --highlight: #21202e;
      }

      * { box-sizing: border-box; }

      ::-webkit-scrollbar-track {
          background: 0 0;
      }

      ::-webkit-scrollbar-thumb {
          background: var(--tertiary);
          border: 5px solid var(--theme);
          border-radius: var(--radius);
      }

      ::-webkit-scrollbar-thumb:hover {
          background: var(--secondary);
      }

      ::-webkit-scrollbar:not(.highlighttable, .highlight table, .gist .highlight) {
          background: var(--theme);
      }

      @media screen and (min-width: 768px) {
          ::-webkit-scrollbar {
              width: 19px;
              height: 11px;
          }
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--base);
        color: var(--text);
        font: 16px/1.6 ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        -webkit-font-smoothing: antialiased;
        transition: background 0.25s ease, color 0.25s ease;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 4rem 1.5rem 6rem;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      h1 {
        margin: 0 0 0.45rem;
        font-size: 1.9rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      h1 .ring { color: var(--iris); }

      .desc { margin: 0; color: var(--subtle); font-size: 1rem; }
      .desc .count { color: var(--foam); }
      .desc a { color: var(--foam); text-decoration: none; }
      .desc a:hover { text-decoration: underline; }

      .actions { flex: none; display: flex; gap: 0.5rem; }

      .icon-btn {
        appearance: none;
        display: grid;
        place-items: center;
        width: 2.4rem;
        height: 2.4rem;
        background: var(--surface);
        color: var(--subtle);
        border: 1px solid var(--overlay);
        border-radius: 0;
        padding: 0;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      }
      .icon-btn:hover { border-color: var(--iris); color: var(--iris); }
      .icon-btn svg { width: 1.15rem; height: 1.15rem; display: block; }

      .controls { margin-bottom: 1.5rem; }

      #search {
        width: 100%;
        appearance: none;
        background: var(--surface);
        color: var(--text);
        border: 3px solid var(--overlay);
        border-radius: 0;
        padding: 0.8rem 1rem;
        font: inherit;
        font-size: 1.05rem;
        margin-bottom: 0.9rem;
        transition: border-color 0.18s ease;
      }
      #search:focus { outline: none; border-color: var(--iris); }
      #search::placeholder { color: var(--muted); }

      .empty { color: var(--muted); font-size: 0.9rem; }

      .section-label {
        margin: 0 0 0.75rem;
        color: var(--muted);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .founders-section {
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--overlay);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 0.9rem;
      }
      .card[hidden] { display: none; }

      .card {
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 1.15rem;
        min-height: 200px;
        border: 3px solid var(--overlay);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
        transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
      }
      .card:hover {
        border-color: var(--iris);
        background: var(--highlight);
        transform: translateY(-2px);
      }
      .card:hover .name { color: var(--foam); }
      .card:hover .arrow { opacity: 1; transform: none; }

      .card-link {
        text-decoration: none;
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .gh-link {
        margin-top: auto;
        width: fit-content;
        color: var(--muted);
        transition: color 0.18s ease;
      }
      .gh-link:hover { color: var(--iris); }
      .gh-link svg { display: block; }

      .avatar {
        position: relative;
        width: 3rem;
        height: 3rem;
        display: grid;
        place-items: center;
        border-radius: 0;
        background: var(--overlay);
        color: var(--iris);
        font-size: 1.2rem;
        font-weight: 600;
        overflow: hidden;
      }
      .avatar img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 4px;
        background: var(--overlay);
      }
      .avatar img[data-failed] { display: none; }

      .meta { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
      .name {
        font-weight: 500;
        font-size: 1.05rem;
        transition: color 0.18s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .host {
        color: var(--muted);
        font-size: 0.85rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .arrow {
        position: absolute;
        top: 1rem;
        right: 1rem;
        color: var(--iris);
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--overlay);
        color: var(--muted);
        font-size: 0.8rem;
        text-align: center;
      }
      footer a { color: var(--pine); text-decoration: none; }
      footer a:hover { text-decoration: underline; }
      .badges { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 0.6rem; }
      .badge-credit { color: var(--muted); font-size: 0.75rem; margin-top: 0.8rem; }

      @media (max-width: 1024px) {
        .grid { grid-template-columns: repeat(5, 1fr); }
      }
      @media (max-width: 720px) {
        .grid { grid-template-columns: repeat(3, 1fr); }
      }
      @media (max-width: 480px) {
        main { padding: 2.5rem 1rem 4rem; }
        .grid { grid-template-columns: repeat(2, 1fr); gap: 0.65rem; }
        h1 { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>thread<span class="ring">locked</span></h1>
          <p class="desc">
            a webring of personal sites.
            <span class="count" id="count"><!--COUNT--></span>
            &middot; <a href="/blog/">check out our blog</a>
          </p>
        </div>
        <div class="actions">
          <a
            class="icon-btn"
            href="https://github.com/threadlockers/webring"
            target="_blank"
            rel="noopener"
            aria-label="View source on GitHub"
          >
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
          <button id="toggle" class="icon-btn" type="button" aria-label="Toggle theme"></button>
        </div>
      </header>

      <div class="founders-section">
        <p class="section-label">founders</p>
        <div class="grid" id="founders-grid"><!--FOUNDERS--></div>
      </div>

      <div class="controls">
        <input
          id="search"
          type="search"
          placeholder="search members…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search members"
        />
      </div>

      <p class="section-label">members</p>
      <div class="grid" id="grid"><!--MEMBERS--></div>

      <p id="empty" class="empty" hidden>no members match.</p>

      <footer>
        <div class="footer-text">
          a <a href="https://en.wikipedia.org/wiki/Webring">webring</a>.
          jump to a <a href="/random">random site</a> &middot; grab the
          <a href="/webring">json</a>
        </div>
        <div class="badge-credit">badges by <a href="https://github.com/nithitsuki">@nithitsuki</a></div>
        <div class="badges">
          <a href="/"><img width="88" height="31" alt="threadlocked webring" src="https://github.com/user-attachments/assets/86fc434f-8b29-4628-b0a3-33cdf4d487c0" /></a>
          <a href="/"><img width="88" height="31" alt="threadlocked webring" src="https://github.com/user-attachments/assets/f4bd0e19-e15e-46ce-9505-2a373f579a73" /></a>
        </div>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script>
      (function () {
        // ---- theme toggle ----
        var root = document.documentElement;
        var btn = document.getElementById("toggle");
        // moon (shown in dark mode) and sun (shown in light mode) svgs
        var icons = {
          dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
          light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
        };

        function apply(theme) {
          root.dataset.theme = theme;
          btn.innerHTML = icons[theme];
          try { localStorage.setItem("theme", theme); } catch (e) {}
        }

        apply(root.dataset.theme || "light");

        btn.addEventListener("click", function () {
          apply(root.dataset.theme === "dark" ? "light" : "dark");
        });

        // ---- search over server-rendered cards ----
        var search = document.getElementById("search");
        var empty = document.getElementById("empty");

        var grid = document.getElementById("grid");
        var items = [].slice
          .call(grid.querySelectorAll(".card"))
          .map(function (el) {
            return { name: el.dataset.name, el: el };
          });

        // shuffle members on every visit
        for (var i = items.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = items[i]; items[i] = items[j]; items[j] = tmp;
        }
        items.forEach(function (it) { grid.appendChild(it.el); });

        var fuse =
          typeof Fuse !== "undefined"
            ? new Fuse(items, {
                keys: ["name"],
                threshold: 0.1,
                ignoreLocation: true,
              })
            : null;

        search.addEventListener("input", function () {
          var q = search.value.trim();
          if (!q) {
            items.forEach(function (it) { it.el.hidden = false; });
            empty.hidden = true;
            return;
          }

          var matched;
          if (fuse) {
            matched = fuse.search(q).map(function (res) { return res.item; });
          } else {
            var lq = q.toLowerCase();
            matched = items.filter(function (it) {
              return it.name.toLowerCase().indexOf(lq) !== -1;
            });
          }

          items.forEach(function (it) {
            it.el.hidden = matched.indexOf(it) === -1;
          });
          empty.hidden = matched.length !== 0;
        });
      })();
    </script>
  </body>
</html>
